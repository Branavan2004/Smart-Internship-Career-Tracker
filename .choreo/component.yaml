schemaVersion: 1.1
components:
  - name: internship-backend
    type: Service
    buildPack: NodeJS
    language: JavaScript
    languageVersion: "20"
    buildCommand: npm ci --prefix server
    startCommand: node server/src/server.js
    endpoints:
      - name: rest-api
        port: 8080
        type: REST
        networkVisibility: Public
        context: /api
        healthCheck:
          path: /api/health

  - name: internship-frontend
    type: WebApplication
    buildPack: React
    language: JavaScript
    languageVersion: "20"
    buildCommand: npm ci --prefix client && npm run build --prefix client
    outputDirectory: client/dist
    endpoints:
      - name: web-app
        port: 8080
        type: HTTP
        networkVisibility: Public
        context: /
